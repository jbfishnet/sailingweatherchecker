name: CI & Release

on:
  push:
    branches: [main, 'feat/**', 'claude/**']
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Tests — GitHub-hosted runner (always available, gates all merges) ────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check — backend
        run: npx tsc --noEmit
        working-directory: backend

      - name: TypeScript check — frontend
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run backend tests
        run: npm run test --workspace backend -- --reporter=verbose

      - name: Run frontend tests
        run: npm run test --workspace frontend -- --reporter=verbose

  # ── Native amd64 build on the Intel self-hosted runner ───────────────────
  build-amd64:
    name: Build ${{ matrix.component }} (amd64)
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: [self-hosted, linux, X64]
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:sha-${{ github.sha }}-amd64
          cache-from: type=gha,scope=${{ matrix.component }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-amd64

  # ── Native arm64 build on the Raspberry Pi runner ────────────────────────
  build-arm64:
    name: Build ${{ matrix.component }} (arm64)
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: [self-hosted, linux, ARM64]
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:sha-${{ github.sha }}-arm64
          cache-from: type=gha,scope=${{ matrix.component }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-arm64

  # ── Combine both arch images into a single multi-arch manifest ───────────
  merge-manifests:
    name: Merge ${{ matrix.component }} manifests
    needs: [build-amd64, build-arm64]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: [self-hosted, linux, X64]
    permissions:
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest (commit sha tag)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:sha-${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:sha-${{ github.sha }}-arm64

      - name: Tag as latest (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:sha-${{ github.sha }}-arm64

      - name: Tag as semver (tagged releases)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:${VERSION} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}:sha-${{ github.sha }}-arm64

  # ── GitHub Release on version tags ───────────────────────────────────────
  release:
    needs: merge-manifests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: docker-compose.yml
