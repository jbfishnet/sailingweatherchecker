version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - sailing-data:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/sailing.db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sailing-data:
