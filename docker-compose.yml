version: '3'
services:
  backend:
    container_name: sailing-backend
    image: sailing-backend:latest
    build:
      context: ./backend
    ports:
      - "3001:3001"
    volumes:
      - sailing-data:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/sailing.db
    restart: unless-stopped

  frontend:
    container_name: sailing-frontend
    image: sailing-frontend:latest
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sailing-data:
