services:
  - type: web
    name: sailing-backend
    env: node
    plan: starter
    buildCommand: npm install && npm run build --workspace backend
    startCommand: npm start --workspace backend
    disk:
      name: sailing-db
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /app/data/sailing.db
      - key: PORT
        value: 3001

  - type: static
    name: sailing-frontend
    env: static
    buildCommand: npm install && npm run build --workspace frontend
    publishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
